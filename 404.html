<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面未找到 | DevToolsBox</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .error-404 { text-align:center; padding:80px 24px; }
    .error-404 h1 { font-size:80px; color:var(--primary); margin-bottom:8px; }
    .error-404 p { font-size:18px; color:var(--text-secondary); margin-bottom:24px; }
  </style>
</head>
<body>
  <main class="error-404">
    <h1>404</h1>
    <p>抱歉，你访问的页面不存在</p>
    <a href="/" class="btn btn-primary">返回首页</a>
  </main>
</body>
</html>
