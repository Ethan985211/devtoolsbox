  <script>
    const input = document.getElementById('jsonInput');
    const output = document.getElementById('jsonOutput');
    const outputPanel = document.getElementById('outputPanel');
    const outputLabel = document.getElementById('outputLabel');
    const validationMsg = document.getElementById('validationMsg');

    function formatJSON() {
      try {
        const obj = JSON.parse(input.value);
        const formatted = JSON.stringify(obj, null, 2);
        output.textContent = formatted;
        outputLabel.textContent = '格式化结果';
        outputPanel.style.display = 'block';
        validationMsg.style.display = 'none';
      } catch (e) {
        showError('JSON 格式错误: ' + e.message);
      }
    }

    function minifyJSON() {
      try {
        const obj = JSON.parse(input.value);
        output.textContent = JSON.stringify(obj);
        outputLabel.textContent = '压缩结果';
        outputPanel.style.display = 'block';
        validationMsg.style.display = 'none';
      } catch (e) {
        showError('JSON 格式错误: ' + e.message);
      }
    }

    function validateJSON() {
      validationMsg.style.display = 'block';
      outputPanel.style.display = 'none';
      try {
        const obj = JSON.parse(input.value);
        const keys = countKeys(obj);
        const lines = JSON.stringify(obj, null, 2).split('\n').length;
        validationMsg.className = 'result-bar';
        validationMsg.innerHTML = '✅ JSON 有效！共 ' + keys + ' 个键，' + lines + ' 行（格式化后）';
      } catch (e) {
        validationMsg.className = 'tool-panel';
        validationMsg.style.cssText = 'background:#fef2f2;border-color:#fecaca;padding:16px;border-radius:8px;margin-bottom:16px';
        validationMsg.innerHTML = '❌ ' + e.message;
      }
    }

    function copyOutput() {
      if (!output.textContent) { alert('没有可复制的内容'); return; }
      navigator.clipboard.writeText(output.textContent).then(() => alert('已复制到剪贴板'));
    }

    function clearAll() {
      input.value = '';
      output.textContent = '';
      outputPanel.style.display = 'none';
      validationMsg.style.display = 'none';
    }

    function showError(msg) {
      output.textContent = msg;
      outputLabel.textContent = '错误';
      outputPanel.style.display = 'block';
      output.style.cssText = 'background:#7f1d1d;color:#fecaca';
      setTimeout(() => output.style.cssText = '', 3000);
    }

    function countKeys(obj) {
      if (typeof obj !== 'object' || obj === null) return 0;
      let count = 0;
      for (const key in obj) { count++; if (typeof obj[key] === 'object' && obj[key] !== null) count += countKeys(obj[key]); }
      return count;
    }
  </script>

<script>
(function() {
  const html = document.documentElement;
  const toggle = document.querySelector(".theme-toggle");
  const saved = localStorage.getItem("devtoolsbox-theme");
  if (saved) { html.setAttribute("data-theme", saved); }
  updateToggleIcon();

  window.toggleTheme = function() {
    const current = html.getAttribute("data-theme");
    const next = current === "dark" ? "light" : "dark";
    html.setAttribute("data-theme", next);
    localStorage.setItem("devtoolsbox-theme", next);
    updateToggleIcon();
  };

  function updateToggleIcon() {
    const isDark = html.getAttribute("data-theme") === "dark";
    toggle.textContent = isDark ? "☀️" : "🌙";
  }
})();
</script>
